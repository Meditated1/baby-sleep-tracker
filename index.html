<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>Sleepytime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-card: #111827;
  --bg-card-hover: #1a2235;
  --bg-surface: #1e293b;
  --border: #1e293b;
  --border-light: #334155;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-sleep: #6366f1;
  --accent-sleep-glow: rgba(99,102,241,0.25);
  --accent-wake: #f59e0b;
  --accent-wake-glow: rgba(245,158,11,0.2);
  --accent-comfort: #06b6d4;
  --accent-comfort-glow: rgba(6,182,212,0.2);
  --accent-cry: #ef4444;
  --accent-cry-glow: rgba(239,68,68,0.3);
  --accent-soothe: #10b981;
  --accent-soothe-glow: rgba(16,185,129,0.2);
  --accent-crib: #8b5cf6;
  --accent-crib-glow: rgba(139,92,246,0.2);
  --accent-bottle: #f472b6;
  --accent-bottle-glow: rgba(244,114,182,0.2);
  --accent-nap: #fbbf24;
  --accent-night: #6366f1;
  --font-display: 'DM Serif Display', serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 14px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body {
  height:100%; overflow-x:hidden;
  background:var(--bg-deep); color:var(--text-primary);
  font-family:var(--font-mono); font-size:14px;
  -webkit-font-smoothing:antialiased;
}
body { padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; min-height:100dvh; }

/* ── Stars ── */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; border-radius:50%; background:rgba(255,255,255,0.6); animation:twinkle 3s ease-in-out infinite alternate; }
@keyframes twinkle { 0%{opacity:0.2} 100%{opacity:0.8} }

.app { position:relative; z-index:1; max-width:375px; margin:0 auto; padding:16px 16px 40px; }

/* ── Header ── */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.header h1 {
  font-family:var(--font-display); font-size:26px; font-weight:400;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,#e2e8f0,#94a3b8);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header .moon { font-size:28px; filter:drop-shadow(0 0 8px rgba(251,191,36,0.4)); }

/* ── Page Nav ── */
.page-nav {
  display:flex; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); padding:3px; margin-bottom:16px; position:relative;
}
.page-nav .nav-slider {
  position:absolute; top:3px; left:3px;
  width:calc(50% - 3px); height:calc(100% - 6px);
  border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--accent-night),#818cf8);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index:0;
}
.page-nav.on-log .nav-slider { transform:translateX(100%); }
.nav-btn {
  flex:1; padding:10px; text-align:center;
  font-family:var(--font-mono); font-size:12px; font-weight:500;
  border:none; background:none; color:var(--text-secondary);
  cursor:pointer; position:relative; z-index:1;
  transition:color 0.3s ease; text-transform:uppercase; letter-spacing:0.06em;
}
.nav-btn.active { color:white; }
.log-badge {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:18px; height:18px; border-radius:9px;
  background:rgba(255,255,255,0.2); font-size:10px;
  margin-left:6px; padding:0 5px; color:white; font-weight:500;
}
.nav-btn:not(.active) .log-badge { background:var(--bg-surface); color:var(--text-muted); }

.page { display:none; }
.page.active { display:block; }

/* ── Session Bar ── */
.session-bar {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px 16px; margin-bottom:16px;
  transition:all 0.3s ease;
}
.real-clock {
  font-family:var(--font-mono); font-size:22px; font-weight:500;
  color:var(--text-primary); letter-spacing:0.05em;
  transition:color 0.3s ease;
}
.real-clock .ampm { font-size:12px; color:var(--text-secondary); margin-left:4px; }
.waking-badge {
  display:flex; align-items:center; gap:6px;
  background:var(--bg-surface); border-radius:20px; padding:6px 12px;
  font-size:12px; color:var(--text-secondary);
}
.waking-badge .count { font-weight:500; color:var(--accent-wake); font-size:16px; }

/* Ferber countdown states */
.session-bar.ferber-wait {
  border-color:var(--accent-cry);
  box-shadow:0 0 20px var(--accent-cry-glow);
  animation:wait-pulse 2s ease-in-out infinite;
}
.session-bar.ferber-wait .real-clock { color:var(--accent-cry); font-size:28px; }
.session-bar.ferber-go {
  border-color:var(--accent-soothe);
  box-shadow:0 0 25px var(--accent-soothe-glow);
}
.session-bar.ferber-go .real-clock { color:var(--accent-soothe); font-size:16px; }
@keyframes wait-pulse {
  0%,100%{box-shadow:0 0 15px var(--accent-cry-glow)}
  50%{box-shadow:0 0 30px var(--accent-cry-glow),0 0 50px rgba(239,68,68,0.1)}
}
.ferber-encourage {
  font-family:var(--font-display); font-size:13px;
  color:var(--accent-soothe); text-align:center;
  padding:6px 0 2px; display:none;
}
.ferber-encourage.visible { display:block; }

/* ── Mode Toggle ── */
.mode-toggle {
  display:flex; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); padding:4px; margin-bottom:16px; position:relative;
}
.mode-toggle .slider {
  position:absolute; top:4px; left:4px;
  width:calc(50% - 4px); height:calc(100% - 8px);
  border-radius:var(--radius-sm);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),background 0.3s ease; z-index:0;
}
.mode-toggle.nap .slider { transform:translateX(0); background:linear-gradient(135deg,var(--accent-nap),#f59e0b); }
.mode-toggle.night .slider { transform:translateX(100%); background:linear-gradient(135deg,var(--accent-night),#818cf8); }
.mode-btn {
  flex:1; padding:10px; text-align:center;
  font-family:var(--font-mono); font-size:13px; font-weight:500;
  border:none; background:none; color:var(--text-secondary);
  cursor:pointer; position:relative; z-index:1; transition:color 0.3s ease;
}
.mode-btn.active { color:var(--bg-deep); }

/* ── Ferber ── */
.ferber-bar {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; display:none;
}
.ferber-bar.visible { display:block; }
.ferber-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.ferber-title { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); }
.ferber-night { font-size:11px; color:var(--accent-sleep); font-weight:500; }
.ferber-intervals { display:flex; gap:8px; }
.ferber-chip {
  flex:1; text-align:center; padding:8px 4px; border-radius:var(--radius-sm);
  background:var(--bg-surface); font-size:13px; font-weight:500;
  color:var(--text-secondary); border:1px solid transparent; transition:all 0.2s ease;
}
.ferber-chip.current { border-color:var(--accent-sleep); color:var(--accent-sleep); background:var(--accent-sleep-glow); }
.ferber-chip.done { opacity:0.4; text-decoration:line-through; }
.ferber-chip span { display:block; font-size:9px; color:var(--text-muted); margin-top:2px; font-weight:400; }

/* ── Night Selector ── */
.night-selector {
  display:flex; align-items:center; justify-content:center; gap:12px;
  margin-bottom:16px; padding:8px; background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius);
}
.night-label { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); }
.night-adj {
  width:28px; height:28px; border-radius:50%;
  border:1px solid var(--border-light); background:var(--bg-surface);
  color:var(--text-primary); font-size:16px; font-family:var(--font-mono);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.night-num { font-size:18px; font-weight:500; color:var(--accent-night); min-width:30px; text-align:center; }

/* ── Session Toggle Button ── */
.session-toggle {
  width:100%; padding:16px; border-radius:var(--radius); border:1px solid var(--border);
  font-family:var(--font-display); font-size:18px; cursor:pointer; margin-bottom:16px;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:all 0.3s ease; -webkit-user-select:none; user-select:none;
}
.session-toggle:active { transform:scale(0.97); }
.session-toggle.start-night {
  background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(129,140,248,0.1));
  border-color:rgba(99,102,241,0.4); color:#818cf8;
}
.session-toggle.start-nap {
  background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(245,158,11,0.1));
  border-color:rgba(251,191,36,0.4); color:#fbbf24;
}
.session-toggle.stop {
  background:linear-gradient(135deg,rgba(251,191,36,0.2),rgba(245,158,11,0.1));
  border-color:rgba(251,191,36,0.5); color:#fbbf24;
}
.sess-timer { font-family:var(--font-mono); font-size:14px; font-weight:500; opacity:0.8; }

/* ── Last Event ── */
.last-event {
  text-align:center; padding:8px; font-size:12px;
  color:var(--text-muted); margin-bottom:4px; min-height:32px;
}
.last-event span { color:var(--text-secondary); }

/* ── Tracker Controls ── */
.tracker-controls { display:none; }
.tracker-controls.visible { display:block; }

/* ── Action Buttons ── */
.btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.action-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; padding:16px 8px; background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; transition:all 0.2s ease; font-family:var(--font-mono);
  -webkit-user-select:none; user-select:none;
}
.action-btn:active { transform:scale(0.96); }
.action-btn .emoji { font-size:24px; line-height:1; }
.action-btn .label { font-size:11px; font-weight:400; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.08em; }
.action-btn.crib { border-color:rgba(139,92,246,0.3); }
.action-btn.crib:active { background:var(--accent-crib-glow); }
.action-btn.sleep { border-color:rgba(99,102,241,0.3); }
.action-btn.sleep:active { background:var(--accent-sleep-glow); }
.action-btn.soothe { border-color:rgba(16,185,129,0.3); }
.action-btn.soothe:active { background:var(--accent-soothe-glow); }
.action-btn.wake { border-color:rgba(245,158,11,0.3); }
.action-btn.wake:active { background:var(--accent-wake-glow); }
.action-btn.wake.timing {
  border-color:var(--accent-wake); background:var(--accent-wake-glow);
  box-shadow:0 0 15px var(--accent-wake-glow);
}
.action-btn .wake-timer { font-family:var(--font-mono); font-size:12px; font-weight:500; color:var(--accent-wake); margin-top:2px; display:none; }

/* ── Duration Buttons ── */
.duration-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.duration-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:14px 8px; background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; transition:all 0.2s ease; font-family:var(--font-mono);
  position:relative; -webkit-user-select:none; user-select:none;
}
.duration-btn:active { transform:scale(0.96); }
.duration-btn .emoji { font-size:22px; }
.duration-btn .label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.08em; }
.duration-btn .timer-display { font-family:var(--font-mono); font-size:13px; font-weight:500; color:var(--text-muted); margin-top:2px; }
.duration-btn.comfort { border-color:rgba(6,182,212,0.3); }
.duration-btn.comfort.active { background:var(--accent-comfort-glow); border-color:var(--accent-comfort); box-shadow:0 0 20px var(--accent-comfort-glow); }
.duration-btn.comfort.active .timer-display { color:var(--accent-comfort); }
.duration-btn.crying { border-color:rgba(239,68,68,0.3); }
.duration-btn.crying.active { background:var(--accent-cry-glow); border-color:var(--accent-cry); box-shadow:0 0 20px var(--accent-cry-glow); animation:cry-pulse 1.5s ease-in-out infinite; }
.duration-btn.crying.active .timer-display { color:var(--accent-cry); }
@keyframes cry-pulse {
  0%,100%{box-shadow:0 0 15px var(--accent-cry-glow)}
  50%{box-shadow:0 0 30px var(--accent-cry-glow),0 0 50px rgba(239,68,68,0.1)}
}
.pulse-dot {
  width:8px; height:8px; border-radius:50%; background:var(--accent-cry);
  position:absolute; top:10px; right:10px; display:none;
  animation:dot-pulse 1s ease-in-out infinite;
}
.duration-btn.crying.active .pulse-dot { display:block; }
@keyframes dot-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:0.5} }

/* ── Bottle ── */
.bottle-tracker {
  display:flex; align-items:center; gap:8px; background:var(--bg-card);
  border:1px solid rgba(244,114,182,0.3); border-radius:var(--radius); padding:10px 14px;
}
.bottle-tracker .emoji { font-size:22px; }
.bottle-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.08em; }
.bottle-controls { display:flex; align-items:center; gap:4px; margin-left:auto; }
.bottle-adj {
  width:34px; height:34px; border-radius:50%;
  border:1px solid var(--border-light); background:var(--bg-surface);
  color:var(--text-primary); font-size:18px; font-family:var(--font-mono);
  cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s ease;
}
.bottle-adj:active { background:var(--accent-bottle-glow); border-color:var(--accent-bottle); }
.bottle-amount { font-family:var(--font-mono); font-size:18px; font-weight:500; min-width:50px; text-align:center; color:var(--accent-bottle); }
.bottle-log-btn {
  padding:8px 14px; background:rgba(244,114,182,0.15);
  border:1px solid rgba(244,114,182,0.4); border-radius:var(--radius-sm);
  color:var(--accent-bottle); font-family:var(--font-mono);
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.08em; cursor:pointer; transition:all 0.15s ease;
}
.bottle-log-btn:active { background:rgba(244,114,182,0.3); }

/* ── Log Page ── */
.log-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.log-header h2 { font-family:var(--font-display); font-size:20px; font-weight:400; color:var(--text-primary); }
.log-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; text-align:center; }
.stat-value { font-family:var(--font-mono); font-size:18px; font-weight:500; color:var(--text-primary); }
.stat-label { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-top:2px; }
.stat-card.wakings .stat-value { color:var(--accent-wake); }
.stat-card.crying .stat-value { color:var(--accent-cry); }
.stat-card.bottles .stat-value { color:var(--accent-bottle); }

.log-actions { display:flex; gap:10px; margin-bottom:16px; }
.util-btn {
  flex:1; padding:10px; background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text-secondary); font-family:var(--font-mono);
  font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
  cursor:pointer; text-align:center; transition:all 0.15s ease;
}
.util-btn:active { background:var(--bg-card-hover); transform:scale(0.97); }
.util-btn.export { border-color:rgba(16,185,129,0.2); }
.util-btn.reset { border-color:rgba(239,68,68,0.15); color:var(--text-muted); }

/* ── Swipeable Log Entries ── */
.log-list { display:flex; flex-direction:column; gap:6px; }
.log-item { position:relative; overflow:hidden; border-radius:var(--radius-sm); }
.log-item .log-actions-bg {
  position:absolute; top:0; right:0; bottom:0;
  display:flex; align-items:stretch;
}
.log-action-btn {
  display:flex; align-items:center; justify-content:center;
  width:70px; border:none; cursor:pointer;
  font-family:var(--font-mono); font-size:10px; font-weight:500;
  text-transform:uppercase; letter-spacing:0.06em;
  flex-direction:column; gap:2px;
}
.log-action-btn.edit-btn { background:#334155; color:var(--text-secondary); }
.log-action-btn.delete-btn { background:var(--accent-cry); color:white; }
.log-action-btn .act-emoji { font-size:16px; }
.log-entry {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--bg-card); border-left:3px solid var(--border);
  position:relative; z-index:1;
  transition:transform 0.2s ease;
  touch-action:pan-y;
}
.log-entry.swiped { transition:transform 0.2s ease; }
.log-entry.crib,.log-entry.session-start { border-left-color:var(--accent-crib); }
.log-entry.sleep { border-left-color:var(--accent-sleep); }
.log-entry.soothe { border-left-color:var(--accent-soothe); }
.log-entry.wake { border-left-color:var(--accent-wake); }
.log-entry.comfort { border-left-color:var(--accent-comfort); }
.log-entry.crying { border-left-color:var(--accent-cry); }
.log-entry.bottle { border-left-color:var(--accent-bottle); }
.log-entry.session-end { border-left-color:var(--accent-nap); }
.log-emoji { font-size:16px; flex-shrink:0; }
.log-text { flex:1; font-size:12px; color:var(--text-secondary); }
.log-time { font-size:11px; color:var(--text-muted); font-weight:500; flex-shrink:0; }
.log-empty { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13px; }
.log-empty .big-emoji { font-size:36px; display:block; margin-bottom:10px; }

/* ── Edit Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  display:none; align-items:center; justify-content:center;
  z-index:200; padding:20px;
}
.modal-overlay.visible { display:flex; }
.modal {
  background:var(--bg-card); border:1px solid var(--border-light);
  border-radius:var(--radius); padding:20px; width:100%; max-width:340px;
}
.modal h3 { font-family:var(--font-display); font-size:18px; margin-bottom:16px; color:var(--text-primary); }
.modal-field { margin-bottom:12px; }
.modal-field label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:4px; }
.modal-field select, .modal-field input {
  width:100%; padding:10px; background:var(--bg-surface);
  border:1px solid var(--border-light); border-radius:var(--radius-sm);
  color:var(--text-primary); font-family:var(--font-mono); font-size:13px;
}
.modal-buttons { display:flex; gap:10px; margin-top:16px; }
.modal-btn {
  flex:1; padding:10px; border-radius:var(--radius-sm); border:1px solid var(--border);
  font-family:var(--font-mono); font-size:12px; cursor:pointer; text-align:center;
  text-transform:uppercase; letter-spacing:0.06em;
}
.modal-btn.cancel { background:var(--bg-surface); color:var(--text-secondary); }
.modal-btn.save { background:var(--accent-sleep); color:white; border-color:var(--accent-sleep); }

/* ── Toast ── */
.toast {
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--bg-card); border:1px solid var(--border-light);
  border-radius:var(--radius); padding:12px 20px;
  font-family:var(--font-mono); font-size:13px; color:var(--text-primary);
  z-index:100; transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 10px 40px rgba(0,0,0,0.5); max-width:340px; text-align:center;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="app">
  <div class="header">
    <h1>Sleepytime</h1>
    <span class="moon">🌙</span>
  </div>

  <div class="page-nav" id="pageNav">
    <div class="nav-slider"></div>
    <button class="nav-btn active" onclick="showPage('tracker')">🎯 Tracker</button>
    <button class="nav-btn" onclick="showPage('log')">📋 Log <span class="log-badge" id="logBadge">0</span></button>
  </div>

  <!-- ═══ TRACKER ═══ -->
  <div class="page active" id="page-tracker">
    <div class="night-selector" id="nightSelector">
      <span class="night-label">Ferber Night</span>
      <button class="night-adj" onclick="adjustNight(-1)">−</button>
      <span class="night-num" id="nightNum">2</span>
      <button class="night-adj" onclick="adjustNight(1)">+</button>
    </div>

    <div class="session-bar" id="sessionBar">
      <div class="real-clock" id="realClock"></div>
      <div class="waking-badge"><span>Wakings</span><span class="count" id="wakingCount">0</span></div>
    </div>
    <div class="ferber-encourage" id="ferberEncourage">💪 Be strong! Go comfort him.</div>

    <div class="mode-toggle night" id="modeToggle">
      <div class="slider"></div>
      <button class="mode-btn" onclick="setMode('nap')">☀️ Nap</button>
      <button class="mode-btn active" onclick="setMode('night')">🌙 Night</button>
    </div>

    <div class="ferber-bar" id="ferberBar">
      <div class="ferber-header">
        <span class="ferber-title">Wait Intervals</span>
        <span class="ferber-night" id="ferberNightLabel">Night 2</span>
      </div>
      <div class="ferber-intervals" id="ferberIntervals"></div>
    </div>

    <!-- Session Start/Stop -->
    <button class="session-toggle start-night" id="sessionToggle" onclick="toggleSession()">🌙 Start Bedtime</button>

    <div class="last-event" id="lastEvent"></div>

    <!-- Tracking Controls -->
    <div class="tracker-controls" id="trackerControls">
      <div class="btn-grid">
        <button class="action-btn crib" onclick="logEvent('crib')"><span class="emoji">🛏️</span><span class="label">Put in Crib</span></button>
        <button class="action-btn sleep" onclick="logEvent('sleep')"><span class="emoji">😴</span><span class="label">Fell Asleep</span></button>
        <button class="action-btn soothe" onclick="logEvent('soothe')"><span class="emoji">✅</span><span class="label">Self Soothed</span></button>
        <button class="action-btn wake" id="wakeBtn" onclick="logEvent('wake')">
          <span class="emoji">👁️</span><span class="label">Woke Up</span>
          <span class="wake-timer" id="wakeTimer"></span>
        </button>
      </div>
      <div class="duration-row">
        <button class="duration-btn comfort" id="comfortBtn" onclick="toggleDuration('comfort')">
          <span class="emoji">🤝</span><span class="label">Comfort</span>
          <span class="timer-display" id="comfortTimer">Tap to start</span>
        </button>
        <button class="duration-btn crying" id="cryingBtn" onclick="toggleDuration('crying')">
          <div class="pulse-dot"></div>
          <span class="emoji">😢</span><span class="label">Crying</span>
          <span class="timer-display" id="cryingTimer">Tap to start</span>
        </button>
      </div>
      <div class="bottle-tracker">
        <span class="emoji">🍼</span>
        <div><div class="bottle-label">Bottle</div></div>
        <div class="bottle-controls">
          <button class="bottle-adj" onclick="adjustBottle(-0.5)">−</button>
          <span class="bottle-amount" id="bottleAmount">0.0 oz</span>
          <button class="bottle-adj" onclick="adjustBottle(0.5)">+</button>
          <button class="bottle-log-btn" onclick="logBottle()">Log</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ LOG ═══ -->
  <div class="page" id="page-log">
    <div class="log-header"><h2 id="logTitle">Tonight's Log</h2></div>
    <div class="log-stats">
      <div class="stat-card wakings"><div class="stat-value" id="statWakings">0</div><div class="stat-label">Wakings</div></div>
      <div class="stat-card crying"><div class="stat-value" id="statCrying">0m</div><div class="stat-label">Cry Time</div></div>
      <div class="stat-card bottles"><div class="stat-value" id="statBottles">0 oz</div><div class="stat-label">Bottles</div></div>
    </div>
    <div class="log-actions">
      <button class="util-btn export" onclick="exportCSV()">📤 Export</button>
      <button class="util-btn reset" onclick="resetSession()">🔄 New Session</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty"><span class="big-emoji">🌙</span>No events yet</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Event</h3>
    <div class="modal-field">
      <label>Event Type</label>
      <select id="editType">
        <option value="crib">🛏️ Put in Crib</option>
        <option value="sleep">😴 Fell Asleep</option>
        <option value="soothe">✅ Self Soothed</option>
        <option value="wake">👁️ Woke Up</option>
        <option value="comfort">🤝 Comfort</option>
        <option value="crying">😢 Crying</option>
        <option value="bottle">🍼 Bottle</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Time</label>
      <input type="time" id="editTime">
    </div>
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let state = {
  mode:'night', nightNumber:2,
  sessionActive:false, sessionStart:null,
  wakingCount:0, bottleOz:0, events:[],
  comfortActive:false, comfortStart:null,
  cryingActive:false, cryingStart:null,
  ferberCheckIn:0,
  ferberTimerActive:false, ferberTimerStart:null, ferberWaitSec:0, ferberDone:false,
  wakeTimerActive:false, wakeTimerStart:null,
  editIndex:-1
};

try {
  const s=localStorage.getItem('sleepytime_v3');
  if(s){
    const p=JSON.parse(s);
    if(p._t&&Date.now()-p._t<18*3600000){
      state={...state,...p};
      ['sessionStart','comfortStart','cryingStart','ferberTimerStart','wakeTimerStart'].forEach(k=>{
        if(state[k])state[k]=new Date(state[k]);
      });
      state.events=state.events.map(e=>({...e,time:new Date(e.time)}));
    }
  }
} catch(e){}

function save(){try{localStorage.setItem('sleepytime_v3',JSON.stringify({...state,_t:Date.now()}))}catch(e){}}

// ══════════════════════════════════════
// STARS
// ══════════════════════════════════════
(function(){const c=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+.5;s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*4}s`;c.appendChild(s)}})();

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const LABELS={crib:'Put in Crib',sleep:'Fell Asleep',soothe:'Self Soothed',wake:'Woke Up','session-start':'Session Started','session-end':'Session Ended'};
const EMOJIS={crib:'🛏️',sleep:'😴',soothe:'✅',wake:'👁️',comfort:'🤝',crying:'😢',bottle:'🍼','session-start':'🌙','session-end':'☀️'};

function fmt(d){d=new Date(d);const h=d.getHours(),m=d.getMinutes().toString().padStart(2,'0');return`${h%12||12}:${m} ${h>=12?'PM':'AM'}`}
function elapsed(ms){const s=Math.floor(ms/1000);return[Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(v=>v.toString().padStart(2,'0')).join(':')}
function shortTime(ms){const s=Math.floor(ms/1000);return`${Math.floor(s/60)}m ${(s%60).toString().padStart(2,'0')}s`}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function vib(p){if(navigator.vibrate)navigator.vibrate(p)}

// ══════════════════════════════════════
// PAGE NAV
// ══════════════════════════════════════
function showPage(p){
  document.getElementById('page-tracker').classList.toggle('active',p==='tracker');
  document.getElementById('page-log').classList.toggle('active',p==='log');
  const n=document.getElementById('pageNav');
  n.classList.toggle('on-log',p==='log');
  n.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',(p==='tracker'&&i===0)||(p==='log'&&i===1)));
  if(p==='log')updateStats();
}

// ══════════════════════════════════════
// FERBER
// ══════════════════════════════════════
function getFerber(n){
  return[
    {label:'1st',mins:Math.min(5+(n-1)*2,15)},
    {label:'2nd',mins:Math.min(10+(n-1)*2,20)},
    {label:'3rd+',mins:Math.min(10+(n-1)*2,20)}
  ];
}
function renderFerber(){
  const iv=getFerber(state.nightNumber);
  document.getElementById('ferberNightLabel').textContent=`Night ${state.nightNumber}`;
  document.getElementById('ferberIntervals').innerHTML=iv.map((v,i)=>{
    const c=i<state.ferberCheckIn?'done':i===state.ferberCheckIn?'current':'';
    return`<div class="ferber-chip ${c}">${v.mins} min<span>${v.label}</span></div>`;
  }).join('');
}
function startFerberCountdown(){
  const iv=getFerber(state.nightNumber);
  const idx=Math.min(state.ferberCheckIn,2);
  state.ferberWaitSec=iv[idx].mins*60;
  state.ferberTimerActive=true;
  state.ferberTimerStart=new Date();
  state.ferberDone=false;
  document.getElementById('sessionBar').classList.add('ferber-wait');
  document.getElementById('sessionBar').classList.remove('ferber-go');
  document.getElementById('ferberEncourage').classList.remove('visible');
  save();
}
function clearFerberTimer(){
  state.ferberTimerActive=false;state.ferberTimerStart=null;state.ferberDone=false;
  const bar=document.getElementById('sessionBar');
  bar.classList.remove('ferber-wait','ferber-go');
  document.getElementById('ferberEncourage').classList.remove('visible');
}

// ══════════════════════════════════════
// MODE
// ══════════════════════════════════════
function setMode(m){
  state.mode=m;
  const t=document.getElementById('modeToggle');
  t.className=`mode-toggle ${m}`;
  t.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(m==='nap'&&i===0)||(m==='night'&&i===1)));
  document.getElementById('ferberBar').classList.toggle('visible',m==='night'&&state.sessionActive);
  document.getElementById('nightSelector').style.display=m==='night'?'flex':'none';
  document.getElementById('logTitle').textContent=m==='night'?"Tonight's Log":"Nap Log";
  updateSessionBtn();
  save();
}
function adjustNight(d){
  state.nightNumber=Math.max(1,Math.min(14,state.nightNumber+d));
  document.getElementById('nightNum').textContent=state.nightNumber;
  state.ferberCheckIn=0;renderFerber();save();
}

// ══════════════════════════════════════
// SESSION START / STOP
// ══════════════════════════════════════
function updateSessionBtn(){
  const btn=document.getElementById('sessionToggle');
  const ctrl=document.getElementById('trackerControls');
  if(state.sessionActive){
    ctrl.classList.add('visible');
    btn.className='session-toggle stop';
    const label=state.mode==='night'?'☀️ Good Morning':'☀️ Nap Over';
    btn.innerHTML=`${label} <span class="sess-timer" id="sessTimer"></span>`;
  } else {
    ctrl.classList.remove('visible');
    if(state.mode==='night'){
      btn.className='session-toggle start-night';
      btn.innerHTML='🌙 Start Bedtime';
    } else {
      btn.className='session-toggle start-nap';
      btn.innerHTML='😴 Start Nap';
    }
  }
}

function toggleSession(){
  if(!state.sessionActive){
    const now=new Date();
    state.sessionActive=true;
    state.sessionStart=now;
    state.ferberCheckIn=0;
    state.wakingCount=0;
    document.getElementById('wakingCount').textContent='0';
    const label=state.mode==='night'?'Bedtime Started':'Nap Started';
    const emoji=state.mode==='night'?'🌙':'😴';
    state.events.unshift({type:'session-start',mode:state.mode,time:now,label,emoji});
    document.getElementById('ferberBar').classList.toggle('visible',state.mode==='night');
    renderFerber();updateSessionBtn();updateUI();
    toast(`${emoji} ${label}`);vib(30);save();
  } else {
    const now=new Date();
    const dur=Date.now()-new Date(state.sessionStart).getTime();
    const label=state.mode==='night'?`Good Morning — ${shortTime(dur)}`:`Nap Over — ${shortTime(dur)}`;
    state.events.unshift({type:'session-end',mode:state.mode,time:now,label,emoji:'☀️',duration:dur});
    // Clear all timers
    clearAllTimers();
    state.sessionActive=false;
    state.ferberCheckIn=0;
    clearFerberTimer();
    document.getElementById('ferberBar').classList.remove('visible');
    updateSessionBtn();updateUI();
    toast(`☀️ ${label}`);vib([30,50,30]);save();
  }
}

function clearAllTimers(){
  if(state.wakeTimerActive){
    state.wakeTimerActive=false;state.wakeTimerStart=null;
    document.getElementById('wakeTimer').style.display='none';
    document.getElementById('wakeBtn').classList.remove('timing');
  }
  if(state.comfortActive){
    state.comfortActive=false;state.comfortStart=null;
    document.getElementById('comfortBtn').classList.remove('active');
    document.getElementById('comfortTimer').textContent='Tap to start';
  }
  if(state.cryingActive){
    state.cryingActive=false;state.cryingStart=null;
    document.getElementById('cryingBtn').classList.remove('active');
    document.getElementById('cryingTimer').textContent='Tap to start';
  }
}

// ══════════════════════════════════════
// EVENT LOGGING
// ══════════════════════════════════════
function logEvent(type){
  const now=new Date();
  state.events.unshift({type,mode:state.mode,time:now,label:LABELS[type],emoji:EMOJIS[type]});

  if(type==='wake'){
    state.wakingCount++;
    document.getElementById('wakingCount').textContent=state.wakingCount;
    state.wakeTimerActive=true;state.wakeTimerStart=now;
    document.getElementById('wakeTimer').style.display='block';
    document.getElementById('wakeBtn').classList.add('timing');
    renderFerber();
    if(state.mode==='night')startFerberCountdown();
  }
  if(type==='sleep'||type==='soothe'){
    if(state.wakeTimerActive){
      state.wakeTimerActive=false;state.wakeTimerStart=null;
      document.getElementById('wakeTimer').style.display='none';
      document.getElementById('wakeBtn').classList.remove('timing');
    }
    clearFerberTimer();
    state.ferberCheckIn=0;
    renderFerber();
  }

  vib(30);updateUI();toast(`${EMOJIS[type]} ${LABELS[type]}`);save();
}

function toggleDuration(type){
  const active=type==='comfort'?state.comfortActive:state.cryingActive;
  const btn=document.getElementById(type+'Btn');
  const tel=document.getElementById(type+'Timer');
  if(!active){
    if(type==='comfort'){
      state.comfortActive=true;state.comfortStart=new Date();
      if(state.ferberTimerActive||state.ferberDone){
        clearFerberTimer();
        if(state.ferberCheckIn<2)state.ferberCheckIn++;
        renderFerber();
      }
    } else {
      state.cryingActive=true;state.cryingStart=new Date();
    }
    btn.classList.add('active');tel.textContent='0m 00s';vib(30);
  } else {
    const start=type==='comfort'?state.comfortStart:state.cryingStart;
    const dur=Date.now()-new Date(start).getTime();
    const lbl=type==='comfort'?'Comfort':'Crying';
    state.events.unshift({type,mode:state.mode,time:new Date(),label:`${lbl} — ${shortTime(dur)}`,emoji:EMOJIS[type],duration:dur});
    if(type==='comfort'){state.comfortActive=false;state.comfortStart=null}
    else{state.cryingActive=false;state.cryingStart=null}
    btn.classList.remove('active');tel.textContent='Tap to start';
    updateUI();toast(`${EMOJIS[type]} ${lbl}: ${shortTime(dur)}`);vib([30,50,30]);save();
  }
}

function adjustBottle(d){
  state.bottleOz=Math.max(0,Math.round((state.bottleOz+d)*10)/10);
  document.getElementById('bottleAmount').textContent=state.bottleOz.toFixed(1)+' oz';vib(15);
}
function logBottle(){
  if(state.bottleOz<=0){toast('Set amount first');return}
  state.events.unshift({type:'bottle',mode:state.mode,time:new Date(),label:`Bottle — ${state.bottleOz.toFixed(1)} oz`,emoji:'🍼',amount:state.bottleOz});
  toast(`🍼 Logged ${state.bottleOz.toFixed(1)} oz`);
  state.bottleOz=0;document.getElementById('bottleAmount').textContent='0.0 oz';
  updateUI();vib([30,50,30]);save();
}

// ══════════════════════════════════════
// EXPORT / RESET
// ══════════════════════════════════════
function exportCSV(){
  if(!state.events.length){toast('No events');return}
  const rows=[['Date','Time','Mode','Event','Duration (s)','Amount (oz)']];
  [...state.events].reverse().forEach(e=>{const d=new Date(e.time);rows.push([d.toLocaleDateString('en-US'),fmt(d),e.mode,e.label,e.duration?Math.round(e.duration/1000):'',e.amount||''])});
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`sleepytime-${state.mode}-${new Date().toISOString().split('T')[0]}.csv`;a.click();
  toast('📤 CSV exported!');
}

function resetSession(){
  if(!confirm('Start new session? Current log will be cleared.'))return;
  state.events=[];state.sessionActive=false;state.sessionStart=null;
  state.wakingCount=0;state.ferberCheckIn=0;state.bottleOz=0;
  state.ferberTimerActive=false;state.ferberTimerStart=null;state.ferberDone=false;
  state.wakeTimerActive=false;state.wakeTimerStart=null;
  clearAllTimers();clearFerberTimer();
  document.getElementById('wakingCount').textContent='0';
  document.getElementById('bottleAmount').textContent='0.0 oz';
  document.getElementById('ferberBar').classList.remove('visible');
  updateSessionBtn();renderFerber();updateUI();save();
  toast('🌟 New session');
}

// ══════════════════════════════════════
// UI UPDATES
// ══════════════════════════════════════
function updateUI(){
  const le=document.getElementById('lastEvent');
  if(state.events.length){
    const e=state.events[0];
    le.innerHTML=`Last: <span>${e.emoji} ${e.label} at ${fmt(e.time)}</span>`;
  } else le.innerHTML='';
  document.getElementById('logBadge').textContent=state.events.length;
  renderLog();
}

function updateStats(){
  document.getElementById('statWakings').textContent=state.wakingCount;
  const cry=state.events.filter(e=>e.type==='crying'&&e.duration).reduce((s,e)=>s+e.duration,0);
  document.getElementById('statCrying').textContent=cry>0?`${Math.round(cry/60000)}m`:'0m';
  const oz=state.events.filter(e=>e.type==='bottle'&&e.amount).reduce((s,e)=>s+e.amount,0);
  document.getElementById('statBottles').textContent=oz>0?`${oz.toFixed(1)} oz`:'0 oz';
}

// ══════════════════════════════════════
// SWIPEABLE LOG
// ══════════════════════════════════════
function renderLog(){
  const c=document.getElementById('logList');
  if(!state.events.length){
    c.innerHTML='<div class="log-empty"><span class="big-emoji">🌙</span>No events yet</div>';
    return;
  }
  c.innerHTML=state.events.map((e,i)=>`
    <div class="log-item" data-index="${i}">
      <div class="log-actions-bg">
        <button class="log-action-btn edit-btn" onclick="openEditModal(${i})"><span class="act-emoji">✏️</span>Edit</button>
        <button class="log-action-btn delete-btn" onclick="deleteEvent(${i})"><span class="act-emoji">🗑️</span>Del</button>
      </div>
      <div class="log-entry ${e.type}" data-index="${i}">
        <span class="log-emoji">${e.emoji}</span>
        <span class="log-text">${e.label}</span>
        <span class="log-time">${fmt(new Date(e.time))}</span>
      </div>
    </div>`).join('');

  // Attach swipe handlers
  c.querySelectorAll('.log-entry').forEach(el=>{
    let startX=0,currentX=0,swiping=false;
    el.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;currentX=startX;swiping=true;
      el.style.transition='none';
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      if(!swiping)return;
      currentX=e.touches[0].clientX;
      const dx=Math.min(0,Math.max(-140,currentX-startX));
      el.style.transform=`translateX(${dx}px)`;
    },{passive:true});
    el.addEventListener('touchend',()=>{
      swiping=false;
      el.style.transition='transform 0.2s ease';
      const dx=currentX-startX;
      if(dx<-60){
        el.style.transform='translateX(-140px)';
      } else {
        el.style.transform='translateX(0)';
      }
    });
  });
}

function deleteEvent(i){
  const removed=state.events[i];
  if(removed.type==='wake'&&state.wakingCount>0){
    state.wakingCount--;
    document.getElementById('wakingCount').textContent=state.wakingCount;
  }
  state.events.splice(i,1);
  updateUI();toast(`🗑️ Deleted: ${removed.label}`);vib(20);save();
}

// ══════════════════════════════════════
// EDIT MODAL
// ══════════════════════════════════════
function openEditModal(i){
  state.editIndex=i;
  const e=state.events[i];
  const typeSelect=document.getElementById('editType');
  // Set type if it exists in options
  const baseType=e.type;
  if(typeSelect.querySelector(`option[value="${baseType}"]`)){
    typeSelect.value=baseType;
  }
  const d=new Date(e.time);
  document.getElementById('editTime').value=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  document.getElementById('editModal').classList.add('visible');
}

function closeEditModal(){
  document.getElementById('editModal').classList.remove('visible');
  state.editIndex=-1;
}

function saveEdit(){
  if(state.editIndex<0)return;
  const e=state.events[state.editIndex];
  const newType=document.getElementById('editType').value;
  const timeParts=document.getElementById('editTime').value.split(':');

  // Update type
  e.type=newType;
  e.emoji=EMOJIS[newType]||e.emoji;
  if(LABELS[newType])e.label=LABELS[newType];
  else if(newType==='comfort')e.label='Comfort';
  else if(newType==='crying')e.label='Crying';
  else if(newType==='bottle')e.label='Bottle';

  // Update time
  const newTime=new Date(e.time);
  newTime.setHours(parseInt(timeParts[0]),parseInt(timeParts[1]));
  e.time=newTime;

  closeEditModal();
  updateUI();toast('✏️ Event updated');save();
}

// ══════════════════════════════════════
// CLOCK / TICK
// ══════════════════════════════════════
function tick(){
  const clockEl=document.getElementById('realClock');
  const bar=document.getElementById('sessionBar');
  const enc=document.getElementById('ferberEncourage');

  // Ferber countdown active
  if(state.ferberTimerActive&&state.ferberTimerStart){
    const sec=Math.floor((Date.now()-new Date(state.ferberTimerStart).getTime())/1000);
    const remaining=state.ferberWaitSec-sec;
    if(remaining>0){
      clockEl.innerHTML=`${Math.floor(remaining/60)}:${(remaining%60).toString().padStart(2,'0')}`;
      bar.classList.add('ferber-wait');bar.classList.remove('ferber-go');
      enc.classList.remove('visible');
    } else {
      if(!state.ferberDone){state.ferberDone=true;vib([100,80,100,80,100]);}
      bar.classList.remove('ferber-wait');bar.classList.add('ferber-go');
      clockEl.innerHTML="✅ Time's up!";
      enc.classList.add('visible');
    }
  } else {
    // Normal clock
    const now=new Date();
    const h=now.getHours(),m=now.getMinutes().toString().padStart(2,'0');
    clockEl.innerHTML=`${h%12||12}:${m}<span class="ampm">${h>=12?'PM':'AM'}</span>`;
  }

  // Session elapsed on stop button
  if(state.sessionActive&&state.sessionStart){
    const el=document.getElementById('sessTimer');
    if(el)el.textContent=elapsed(Date.now()-new Date(state.sessionStart).getTime());
  }

  // Wake count-up
  if(state.wakeTimerActive&&state.wakeTimerStart){
    document.getElementById('wakeTimer').textContent=shortTime(Date.now()-new Date(state.wakeTimerStart).getTime());
  }
  // Comfort/Crying
  if(state.comfortActive&&state.comfortStart)document.getElementById('comfortTimer').textContent=shortTime(Date.now()-new Date(state.comfortStart).getTime());
  if(state.cryingActive&&state.cryingStart)document.getElementById('cryingTimer').textContent=shortTime(Date.now()-new Date(state.cryingStart).getTime());
}
tick();
setInterval(tick,1000);

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
setMode(state.mode);
renderFerber();
updateSessionBtn();
updateUI();
document.getElementById('nightNum').textContent=state.nightNumber;
document.getElementById('wakingCount').textContent=state.wakingCount;
if(state.bottleOz>0)document.getElementById('bottleAmount').textContent=state.bottleOz.toFixed(1)+' oz';
if(state.wakeTimerActive){document.getElementById('wakeTimer').style.display='block';document.getElementById('wakeBtn').classList.add('timing');}
if(state.comfortActive)document.getElementById('comfortBtn').classList.add('active');
if(state.cryingActive)document.getElementById('cryingBtn').classList.add('active');
if(state.ferberTimerActive)document.getElementById('sessionBar').classList.add('ferber-wait');
</script>
